services:
  - type: web
    name: erp
    env: docker
    region: frankfurt
    plan: starter
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: AUTO_CREATE_TABLES
        value: true
      - key: CORS_ORIGINS
        value: ""
      - key: FIRST_ADMIN_USERNAME
        value: admin
      - key: FIRST_ADMIN_PASSWORD
        value: Admin@1234
      - key: FIRST_ADMIN_FULL_NAME
        value: مدير النظام
      - key: SEED_DEMO
        value: "true"

databases:
  - name: erp-db
    region: frankfurt
    plan: basic-256mb
    databaseName: erp
    user: erp_user
